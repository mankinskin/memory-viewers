# App name (used as the crate/binary name dx builds)
name = "ticket-viewer-dioxus"

# Output directory for dx build / dx serve
out_dir = "dist"

# Static assets
asset_dir = "public"

[web.app]
title = "Ticket Viewer"

[web.watcher]
reload_html = true
watch_path = ["src", "public"]

[web.resource]
style = ["/viewer-api.css"]
script = []

[web.resource.dev]
style = ["/viewer-api.css"]
script = []
