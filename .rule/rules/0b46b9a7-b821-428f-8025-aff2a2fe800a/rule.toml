body = "# memory-viewers\r\n\r\nmemory-viewers is the top-level repository for the user-facing viewer tools and the nested toolchain they depend on.\r\n\r\n## Tool Surface\r\n\r\n| Tool | What it exposes | Use it when |\r\n| --- | --- | --- |\r\n| <code>ticket&#8209;viewer</code> | Ticket board and graph views | You want to review active work, owners, and dependency flow visually. |\r\n| <code>spec&#8209;viewer</code> | Spec browsing UI | You want to inspect specs, sections, and linked code references. |\r\n| <code>memory&#8209;api</code> | CLI, MCP, HTTP, and VS Code tooling | You need automation or authoring workflows behind rules, specs, tickets, and audits. |\r\n| <code>viewer&#8209;api</code> | Shared viewer-facing APIs | You need reusable viewer integration surfaces across the stack. |\r\n"
