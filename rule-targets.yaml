imports:
- memory-api/rule-targets.yaml
- viewer-api/rule-targets.yaml

files:
- name: README.md
  target:
    name: memory-viewers-readme
    repo_scope: memory-viewers
    file_kind: README
    path_scope: README.md
    nodes:
    - name: tool-surface
      section: memory-viewers
    - name: tool-screenshots
      title: Tool Screenshots
      section: memory-viewers/user-stories
    - name: dependency-graph
      title: Dependency Graph
      section: memory-viewers/usage-guide
    - name: tool-use-examples
      title: Tool Use Examples
      section: memory-viewers/nested-workspaces
- name: AGENTS.md
  target:
    name: memory-viewers-agents
    repo_scope: memory-viewers
    file_kind: AGENTS
    path_scope: AGENTS.md
    nodes:
    - name: agent-rules
      title: Agent Rules
      section: agent-rules
      nodes:
      - name: operating-principles
        title: Operating Principles
        section: agent-rules/operating-principles
      - name: discovery-protocol-before-editing
        title: Discovery Protocol (Before Editing)
        section: agent-rules/discovery-protocol-before-editing
      - name: task-routing
        title: Task Routing
        section: agent-rules/task-routing
      - name: quality-gates
        title: Quality Gates
        section: agent-rules/quality-gates
      - name: feedback-workflow
        title: Feedback Workflow
        section: agent-rules/feedback-workflow
      - name: escalation-rules
        title: Escalation Rules
        section: agent-rules/escalation-rules
      - name: fallback-mode-when-mcp-is-unavailable
        title: Fallback Mode (When MCP Is Unavailable)
        section: agent-rules/fallback-mode-when-mcp-is-unavailable
      - name: canonical-sources
        title: Canonical Sources
        section: agent-rules/canonical-sources
folders:
- name: .github
  folders:
  - name: agents
    files:
    - name: roast.agent.md
      target:
        name: memory-viewers-agent-roast
        repo_scope: memory-viewers
        file_kind: .agent
        path_scope: .github/agents/roast.agent.md
    - name: ticket-refinement.agent.md
      target:
        name: memory-viewers-agent-ticket-refinement
        repo_scope: memory-viewers
        file_kind: .agent
        path_scope: .github/agents/ticket-refinement.agent.md
